
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: eslint
spec:
  steps:
    - name: lint
      image: node:18
      script: |
        cd server
        npm install
        npm run lint

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jest-test
spec:
  steps:
    - name: test
      image: node:18
      script: |
        cd server
        npm install
        npm test

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning workspace"
        rm -rf /workspace/*
